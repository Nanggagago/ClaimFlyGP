name: ${project.name}
version: ${project.version}
main: ${main.class}
author: ${author}
# DO NOT EDIT. This api-version is used for maximum backward compatibility.
api-version: 1.13
# DO NOT EDIT. This will enable Nashorn library on servers using Java 15 or greater.
libraries:
  - org.openjdk.nashorn:nashorn-core:15.4
depend: [ GriefPrevention ]
softdepend: [ CMI, Vault, AuthMe, BanManager, BungeeChatAPI, DiscordSRV, Factions, Feudal, ItemsAdder, Essentials, LegacyFactions, Lands, LuckPerms, Multiverse-Core, MVdWPlaceholderAPI, MythicMobs, mcMMO, NashornPlus, Nicky, PlaceholderAPI, ProtocolLib, SimpleClans, Towny, TownyChat, WorldEdit ]
website: www.dirtydoggaming.co.za

permissions:
  servercore.claimfly.use:
    description: Allow a player to use claimfly in claims they own or are trusted in
    default: op
  servercore.claimfly.claims.admin:
    description: Allow a player to use claimfly in admin claims
    default: op
  servercore.claimfly.claims.others:
    description: Allow a player to use claimfly in any claim
    default: op
  servercore.claimfly.claims.unclaimed:
    description: Allow a player to use claimfly outside of claims
    default: op